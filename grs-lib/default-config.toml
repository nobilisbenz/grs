# grs repository config (`.grs/config.toml`).
# Layered: built-in defaults < user config (~/.config/grs/config.toml)
#          < this file < CLI flags. Right wins on scalars.

[watcher]
# Milliseconds to collapse bursts of save events into one snap.
debounce_ms = 1500
# Extra ignore patterns appended to .grsignore.
ignore_extra = []

[tui]
# syntect theme name (must exist in the bundled ThemeSet).
syntax_theme = "base16-eighties.dark"
